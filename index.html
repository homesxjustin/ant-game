<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9F%90%9C%3C/text%3E%3C/svg%3E"
    />
    <title>SimAnt: Evolution</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0d0a;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #e6efe0;
      }
      #app { position: fixed; inset: 0; }
      #game-canvas { display: block; width: 100%; height: 100%; touch-action: none; }
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: #0b0d0a; z-index: 10; text-align: center;
      }
      #boot h1 { font-size: clamp(20px, 4vw, 34px); letter-spacing: 2px; color: #d7c34a; }
      #boot p { margin-top: 10px; opacity: 0.7; font-size: 13px; }
      #boot.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
    </div>
    <div id="boot">
      <div>
        <h1>SimAnt: Evolution</h1>
        <p>Loading colony…</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
